    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Study builder – DentAIstudy</title>

    <link rel="stylesheet" href="assets/css/study-builder/base.css" />
    <link rel="stylesheet" href="assets/css/study-builder/shell.css" />
    <link rel="stylesheet" href="assets/css/study-builder/sidebar.css" />
    <link rel="stylesheet" href="assets/css/study-builder/topbar.css" />
    <link rel="stylesheet" href="assets/css/study-builder/thread.css" />
    <link rel="stylesheet" href="assets/css/study-builder/composer.css" />
    <link rel="stylesheet" href="assets/css/study-builder/responsive.css" />
    <link rel="stylesheet" href="assets/css/study-builder/markdown.css" />
    <link rel="stylesheet" href="assets/css/hamburger-legacy.css" />
  </head>

  <body>
    <div class="app" data-theme="light">
      <aside class="sidebar" id="sidebar" aria-label="Sidebar">
        <div class="sb-top">
          <div class="sb-title">
            <a class="brand" href="index.html" aria-label="DentAIstudy home">
              <span>Dent</span><span>AIstudy</span>
            </a>
            <div class="sb-plan" id="das-study-plan-badge" aria-label="Plan">
              Free
            </div>
          </div>
        </div>

        <div class="userchip">
          <div class="avatar" aria-hidden="true">
            <img
              src="assets/img/default-avatar.png"
              alt="Your avatar"
              data-das-avatar
            />
          </div>

          <div class="user-meta">
            <div class="user-name" id="das-user-name">DentAIstudy User</div>
          </div>
        </div>

        <nav class="sb-nav" aria-label="Account">
          <a class="sb-btn" href="profile.html" data-action="profile">
            <span class="ico" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21a8 8 0 0 0-16 0" />
                <circle cx="12" cy="8" r="4" />
              </svg>
            </span>
            My Profile
          </a>

          <a class="sb-btn" href="settings.html" data-action="settings">
            <span class="ico" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <!-- Top slider -->
                <line x1="4" y1="6" x2="6.8" y2="6" />
                <line x1="11.2" y1="6" x2="20" y2="6" />
                <circle cx="9" cy="6" r="2.2" fill="none" />

                <!-- Middle slider -->
                <line x1="4" y1="12" x2="12.8" y2="12" />
                <line x1="17.2" y1="12" x2="20" y2="12" />
                <circle cx="15" cy="12" r="2.2" fill="none" />

                <!-- Bottom slider -->
                <line x1="4" y1="18" x2="6.8" y2="18" />
                <line x1="11.2" y1="18" x2="20" y2="18" />
                <circle cx="9" cy="18" r="2.2" fill="none" />
              </svg>
            </span>
            Account Settings
          </a>
        </nav>

        <nav class="sb-nav" aria-label="Primary">
          <button class="sb-btn" type="button" data-action="newChat">
            <span class="ico" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M12 5v14M5 12h14" />
              </svg>
            </span>
            New chat
          </button>

          <button class="sb-btn" type="button" data-action="search">
            <span class="ico" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M20 20l-3.2-3.2"></path>
              </svg>
            </span>
            Search chats
          </button>
        </nav>

        <div id="sbChatsSlot">
          <div class="sb-section">
            <div class="sb-section-title">Your chats</div>
            <div class="sb-chatlist" id="chatList" role="list"></div>
            <div class="sb-chatlist-empty" id="chatListEmpty" hidden>
              No chats yet
            </div>
          </div>
        </div>
      </aside>
      <main class="main" aria-label="Chat">
        <header class="topbar site-header">
          <button class="menu-toggle" type="button" aria-label="Open menu">
            <span></span><span></span><span></span>
          </button>

          <div class="topbar-title">
            <div class="topbar-page" aria-label="Page">Study Builder</div>

            <a
              class="brand topbar-brand"
              href="index.html"
              aria-label="DentAIstudy home"
            >
              <span>Dent</span><span>AIstudy</span>
            </a>
          </div>

          <div class="topbar-actions">
            <button
              class="iconbtn"
              type="button"
              aria-label="New chat"
              data-action="newChat"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <button
              class="iconbtn"
              id="btnMore"
              type="button"
              aria-label="Chats"
              aria-controls="chatsPanel"
              aria-expanded="false"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M6 12h.01M12 12h.01M18 12h.01" />
              </svg>
            </button>
          </div>
          <div class="header-right">
            <a href="login.html" class="header-login">Log in</a>
            <a href="signup.html" class="header-signup">Sign up</a>
          </div>
        </header>
        <div
          class="chats-panel"
          id="chatsPanel"
          role="dialog"
          aria-label="Chats"
          aria-modal="true"
          hidden
        >
          <div class="chats-panel-head">
            <div class="chats-panel-title">Chats</div>
            <button
              class="iconbtn"
              id="chatsPanelClose"
              type="button"
              aria-label="Close chats"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M6 6l12 12M18 6L6 18" />
              </svg>
            </button>
          </div>
          <div class="chats-panel-body" id="chatsPanelBody">
            <input
              class="chats-search"
              id="chatsSearch"
              type="search"
              placeholder="Search chats…"
              aria-label="Search chats"
              autocomplete="off"
            />
            <div id="chatsPanelContent"></div>
          </div>
        </div>

        <section class="thread" id="thread" aria-label="Messages">
          <div class="thread-inner" id="messages"></div>

          <button
            class="jump"
            id="jump"
            type="button"
            aria-label="Jump to latest"
            hidden
          >
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 5v14" />
              <path d="m19 12-7 7-7-7" />
            </svg>
          </button>
        </section>

        <!-- Error / info toast -->
        <div id="dropToast" class="drop-toast" hidden aria-live="polite"></div>

        <!-- Drop zone overlay (desktop drag-and-drop) -->
        <div id="dropOverlay" class="drop-overlay" hidden aria-hidden="true">
          <div class="drop-overlay-inner">
            <div class="drop-overlay-ico">
              <svg
                viewBox="0 0 24 24"
                width="28"
                height="28"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"
                />
                <path d="M14 2v5h5" />
                <line x1="12" y1="18" x2="12" y2="12" />
                <polyline points="9 15 12 12 15 15" />
              </svg>
            </div>
            <p class="drop-overlay-label">Drop PDF to attach</p>
          </div>
        </div>

        <footer class="composer-wrap" aria-label="Composer">
          <form class="composer" id="composer" autocomplete="off">
            <button class="roundbtn" type="button" aria-label="Add" id="btnAdd">
              <span aria-hidden="true">+</span>
            </button>
            <div
              class="addmenu"
              id="addMenu"
              role="dialog"
              aria-label="Add menu"
              hidden
            >
              <button class="addmenu-item" type="button" data-add="pdf">
                <span class="addmenu-ico addmenu-ico--pdf" aria-hidden="true">
                  <svg
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                    />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="9" y1="13" x2="15" y2="13" />
                    <line x1="9" y1="17" x2="13" y2="17" />
                  </svg>
                </span>
                <span class="addmenu-item-text">
                  <span class="addmenu-item-title">Attach PDF</span>
                  <span class="addmenu-item-sub">Upload study material</span>
                </span>
              </button>

              <div class="addmenu-divider"></div>
              <div class="addmenu-title">Study mode</div>

              <div class="addmenu-pills" role="group" aria-label="Study mode">
                <button class="addpill is-active" type="button" data-task="qa">
                  <span class="addpill-ico addpill-ico--qa" aria-hidden="true">
                    <svg
                      viewBox="0 0 24 24"
                      width="15"
                      height="15"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2.2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polygon
                        points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
                      />
                    </svg>
                  </span>
                  <span class="addpill-body">
                    <span class="addpill-name">Quick answer</span>
                    <span class="addpill-sub">Focused, exam-relevant</span>
                  </span>
                </button>

                <button class="addpill" type="button" data-task="chapter_notes">
                  <span
                    class="addpill-ico addpill-ico--deep"
                    aria-hidden="true"
                  >
                    <svg
                      viewBox="0 0 24 24"
                      width="15"
                      height="15"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2.2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                    </svg>
                  </span>
                  <span class="addpill-body">
                    <span class="addpill-name">Deep study</span>
                    <span class="addpill-sub">Full chapter & notes</span>
                  </span>
                </button>
              </div>
            </div>

            <div class="input-shell">
              <div class="attachbar" id="attachBar" hidden></div>

              <textarea
                id="prompt"
                class="prompt"
                rows="1"
                placeholder="Ask anything…"
                aria-label="Ask anything"
              ></textarea>

              <input
                type="file"
                id="pdfInput"
                accept="application/pdf"
                multiple
                hidden
              />

              <div class="input-actions">
                <button
                  class="sendbtn"
                  id="send"
                  type="submit"
                  aria-label="Send"
                >
                  <svg
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M12 5v14"></path>
                    <path d="M6.5 10.5 12 5l5.5 5.5"></path>
                  </svg>
                </button>
              </div>
            </div>
          </form>
        </footer>
      </main>
    </div>

    <script

    <script src="assets/js/auth-client.js" defer></script>

    <script src="assets/js/study-builder/sidebar.js" defer></script>
    <script src="assets/js/study-builder/composer.js" defer></script>

    <!-- Desktop modal (Rename/Delete chat) -->
    <div class="das-modal-overlay" id="dasModalOverlay" hidden>
      <div
        class="das-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dasModalTitle"
      >
        <h3 class="das-modal__title" id="dasModalTitle"></h3>
        <p class="das-modal__message" id="dasModalMessage"></p>
        <input
          class="das-modal__input"
          id="dasModalInput"
          type="text"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="das-modal__actions">
          <button
            type="button"
            class="das-modal__btn das-modal__btn--ghost"
            id="dasModalCancelBtn"
          >
            Cancel
          </button>
          <button
            type="button"
            class="das-modal__btn das-modal__btn--primary"
            id="dasModalOkBtn"
          >
            OK
          </button>
        </div>
      </div>

    <div class="backdrop" id="backdrop" hidden></div>
