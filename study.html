<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Study builder – DentAIstudy</title>

    <link rel="stylesheet" href="assets/css/study-builder/base.css" />
    <link rel="stylesheet" href="assets/css/study-builder/shell.css" />
    <link rel="stylesheet" href="assets/css/study-builder/sidebar.css" />
    <link rel="stylesheet" href="assets/css/study-builder/topbar.css" />
    <link rel="stylesheet" href="assets/css/study-builder/thread.css" />
    <link rel="stylesheet" href="assets/css/study-builder/composer.css" />
    <link rel="stylesheet" href="assets/css/study-builder/responsive.css" />
    <link rel="stylesheet" href="assets/css/study-builder/markdown.css" />
    <link rel="stylesheet" href="assets/css/hamburger-legacy.css" />
  </head>

  <body>
    <div class="app" data-theme="light">
      <aside class="sidebar" id="sidebar" aria-label="Sidebar">
        <div class="sb-top">
          <div class="sb-title">
            <a class="brand" href="index.html" aria-label="DentAIstudy home">
              <span>Dent</span><span>AIstudy</span>
            </a>
            <div class="sb-plan" aria-label="Plan">Free</div>
          </div>
        </div>

        <div class="userchip">
          <div class="avatar" aria-hidden="true">
            <img
              src="assets/img/default-avatar.png"
              alt="Your avatar"
              data-das-avatar
            />
          </div>

          <div class="user-meta">
            <div class="user-name" id="das-user-name">DentAIstudy User</div>
            <div class="user-plan" id="das-identity-plan">Plus</div>
          </div>
        </div>

        <nav class="sb-nav" aria-label="Account">
          <a class="sb-btn" href="profile.html" data-action="profile">
            <span class="ico" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21a8 8 0 0 0-16 0" />
                <circle cx="12" cy="8" r="4" />
              </svg>
            </span>
            My Profile
          </a>

          <a class="sb-btn" href="settings.html" data-action="settings">
            <span class="ico" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <!-- Top slider -->
                <line x1="4" y1="6" x2="6.8" y2="6" />
                <line x1="11.2" y1="6" x2="20" y2="6" />
                <circle cx="9" cy="6" r="2.2" fill="none" />

                <!-- Middle slider -->
                <line x1="4" y1="12" x2="12.8" y2="12" />
                <line x1="17.2" y1="12" x2="20" y2="12" />
                <circle cx="15" cy="12" r="2.2" fill="none" />

                <!-- Bottom slider -->
                <line x1="4" y1="18" x2="6.8" y2="18" />
                <line x1="11.2" y1="18" x2="20" y2="18" />
                <circle cx="9" cy="18" r="2.2" fill="none" />
              </svg>
            </span>
            Account Settings
          </a>
        </nav>

        <nav class="sb-nav" aria-label="Primary">
          <button class="sb-btn" type="button" data-action="newChat">
            <span class="ico" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M12 5v14M5 12h14" />
              </svg>
            </span>
            New chat
          </button>

          <button class="sb-btn" type="button" data-action="search">
            <span class="ico" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M20 20l-3.2-3.2"></path>
              </svg>
            </span>
            Search chats
          </button>
        </nav>

        <div id="sbChatsSlot">
          <div class="sb-section">
            <div class="sb-section-title">Your chats</div>
            <div class="sb-chatlist" id="chatList" role="list"></div>
            <div class="sb-chatlist-empty" id="chatListEmpty" hidden>
              No chats yet
            </div>
          </div>
        </div>
      </aside>
      <main class="main" aria-label="Chat">
        <header class="topbar site-header">
          <button class="menu-toggle" type="button" aria-label="Open menu">
            <span></span><span></span><span></span>
          </button>

          <div class="topbar-title">
            <div class="topbar-page" aria-label="Page">Study Builder</div>

            <a
              class="brand topbar-brand"
              href="index.html"
              aria-label="DentAIstudy home"
            >
              <span>Dent</span><span>AIstudy</span>
            </a>
          </div>

          <div class="topbar-actions">
            <button
              class="iconbtn"
              type="button"
              aria-label="New chat"
              data-action="newChat"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
            <button
              class="iconbtn"
              id="btnMore"
              type="button"
              aria-label="Chats"
              aria-controls="chatsPanel"
              aria-expanded="false"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M6 12h.01M12 12h.01M18 12h.01" />
              </svg>
            </button>
          </div>
          <div class="header-right">
            <a href="login.html" class="header-login">Log in</a>
            <a href="signup.html" class="header-signup">Sign up</a>
          </div>
        </header>
        <div
          class="chats-panel"
          id="chatsPanel"
          role="dialog"
          aria-label="Chats"
          aria-modal="true"
          hidden
        >
          <div class="chats-panel-head">
            <div class="chats-panel-title">Chats</div>
            <button
              class="iconbtn"
              id="chatsPanelClose"
              type="button"
              aria-label="Close chats"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M6 6l12 12M18 6L6 18" />
              </svg>
            </button>
          </div>
          <div class="chats-panel-body" id="chatsPanelBody">
            <input
              class="chats-search"
              id="chatsSearch"
              type="search"
              placeholder="Search chats…"
              aria-label="Search chats"
              autocomplete="off"
            />
            <div id="chatsPanelContent"></div>
          </div>
        </div>

        <section class="thread" id="thread" aria-label="Messages">
          <div class="thread-inner" id="messages"></div>

          <button
            class="jump"
            id="jump"
            type="button"
            aria-label="Jump to latest"
            hidden
          >
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 5v14" />
              <path d="m19 12-7 7-7-7" />
            </svg>
          </button>
        </section>

        <footer class="composer-wrap" aria-label="Composer">
          <form class="composer" id="composer" autocomplete="off">
            <button class="roundbtn" type="button" aria-label="Add" id="btnAdd">
              <span aria-hidden="true">+</span>
            </button>
            <div
              class="addmenu"
              id="addMenu"
              role="dialog"
              aria-label="Add menu"
              hidden
            >
              <button class="addmenu-item" type="button" data-add="pdf">
                <span class="addmenu-ico" aria-hidden="true">
                  <!-- paperclip icon -->
                  <svg
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M21.44 11.05 12.2 20.29a5 5 0 0 1-7.07-7.07l9.2-9.2a3.5 3.5 0 1 1 4.95 4.95l-9.2 9.2a2 2 0 0 1-2.83-2.83l8.49-8.49"
                    />
                  </svg>
                </span>
                <span class="addmenu-label">Add PDF</span>
              </button>

              <div class="addmenu-title">Output style</div>

              <div class="addmenu-pills" role="group" aria-label="Output style">
                <button
                  class="addpill is-active"
                  type="button"
                  data-style="notes"
                >
                  Notes
                </button>
                <button class="addpill" type="button" data-style="flashcards">
                  Flashcards
                </button>
                <button class="addpill" type="button" data-style="mcqs">
                  MCQs
                </button>
                <button class="addpill" type="button" data-style="compare">
                  Compare table
                </button>
              </div>
            </div>

            <div class="input-shell">
              <div class="attachbar" id="attachBar" hidden></div>

              <textarea
                id="prompt"
                class="prompt"
                rows="1"
                placeholder="Ask anything…"
                aria-label="Ask anything"
              ></textarea>

              <input
                type="file"
                id="pdfInput"
                accept="application/pdf"
                multiple
                hidden
              />

              <div class="input-actions">
                <button
                  class="sendbtn"
                  id="send"
                  type="submit"
                  aria-label="Send"
                >
                  <svg
                    viewBox="0 0 24 24"
                    width="20"
                    height="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M12 5v14"></path>
                    <path d="M6.5 10.5 12 5l5.5 5.5"></path>
                  </svg>
                </button>
              </div>
            </div>
          </form>
        </footer>
      </main>
    </div>

    <!-- Supabase + Auth -->
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
      defer
    ></script>
    <script src="assets/js/auth-client.js" defer></script>
    <script src="assets/js/auth-guard.js" defer></script>
    <script src="assets/js/auth-logout.js" defer></script>

    <!-- Legacy hamburger -->
    <script src="assets/js/hamburger-legacy.js" defer></script>

    <!-- Services + adapters (old study-builder.js trimmed) -->

    <!-- PDF.js (local, v5.x ESM build) -->
    <script type="module">
      import * as pdfjsLib from "./assets/vendor/pdfjs/pdf.mjs";
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "./assets/vendor/pdfjs/pdf.worker.mjs";
      window.pdfjsLib = pdfjsLib;
    </script>

    <script src="assets/js/study-builder.js" defer></script>

    <!-- New UI (untouched) -->
    <script src="assets/js/study-builder/core.js" defer></script>
    <script src="assets/js/study-builder/sidebar.js" defer></script>
    <script src="assets/js/study-builder/composer.js" defer></script>

    <!-- Mobile nav (legacy) -->
    <div class="slide-nav-backdrop"></div>
    <nav class="slide-nav" aria-label="Mobile menu">
      <div class="slide-nav-header">
        <h3>Menu</h3>
      </div>
      <div class="slide-nav-links">
        <a href="study.html">Study builder</a>
        <a href="subjects.html">Subjects</a>
        <a href="blogs.html">Blogs</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>

        <div
          class="slide-nav-divider"
          role="separator"
          aria-hidden="true"
        ></div>

        <a href="profile.html">My profile</a>
        <a href="settings.html">Account settings</a>

        <div
          class="slide-nav-divider"
          role="separator"
          aria-hidden="true"
        ></div>
        <a href="login.html" class="slide-login-link">Log in</a>
      </div>
    </nav>
    <div class="backdrop" id="backdrop" hidden></div>
  </body>
</html>
